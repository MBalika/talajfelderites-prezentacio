<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Talajfelderítés — előadás (vetíthető)</title>
<style>
:root{
  --mono:'JetBrains Mono',ui-monospace,Consolas,monospace;
  --body:'Segoe UI',system-ui,-apple-system,sans-serif;
  --ink:#16202e; --ink2:#3a4858; --ink3:#6b7888; --line:#dfe4ec; --paper:#f7f9fc;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0c1320;font-family:var(--body);color:var(--ink)}
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 700px at 50% 40%,#16243a,#0a111d)}
.deck{width:1280px;height:720px;position:relative;transform-origin:center center;border-radius:6px;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.55);background:#fff}
.slide{position:absolute;inset:0;opacity:0;visibility:hidden;transition:opacity .45s ease, transform .45s ease;transform:translateX(24px);padding:0;display:flex;flex-direction:column;background:#fff}
.slide.on{opacity:1;visibility:visible;transform:none;z-index:2}
.slide.prev{transform:translateX(-24px)}
/* fejléc */
.head{padding:34px 56px 0;flex:none}
.kicker{font-family:var(--mono);font-size:17px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.title{font-weight:800;font-size:40px;line-height:1.1;letter-spacing:-.01em;color:var(--ink)}
.rule{height:4px;width:96px;border-radius:2px;margin-top:14px}
.bodyA{flex:1;min-height:0;padding:22px 56px 40px;display:flex;flex-direction:column;gap:14px}
/* listák */
ul.big{list-style:none;display:flex;flex-direction:column;gap:14px;margin-top:4px}
ul.big li{position:relative;padding-left:34px;font-size:25px;line-height:1.35;color:var(--ink2)}
ul.big li::before{content:'';position:absolute;left:4px;top:13px;width:12px;height:12px;border-radius:3px}
ul.big li b{color:var(--ink)}
ul.sub{list-style:none;margin:8px 0 0 34px;display:flex;flex-direction:column;gap:7px}
ul.sub li{position:relative;padding-left:22px;font-size:20px;color:var(--ink3)}
ul.sub li::before{content:'–';position:absolute;left:0;color:var(--ink3)}
.lead{font-size:27px;line-height:1.4;color:var(--ink2)}
.lead b{color:var(--ink)}
.tag{display:inline-block;font-family:var(--mono);font-size:15px;font-weight:700;padding:4px 12px;border-radius:20px;margin:2px 4px 2px 0}
/* kép-elrendezések */
.imgwrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center}
.imgwrap img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 8px 26px rgba(15,30,50,.18);object-fit:contain}
.cap{font-family:var(--mono);font-size:15px;color:var(--ink3);text-align:center;margin-top:10px;flex:none}
.two{display:grid;grid-template-columns:1.15fr 1fr;gap:34px;flex:1;min-height:0;align-items:center}
.two .col-img{height:100%;display:flex;align-items:center;justify-content:center}
.two .col-img img{max-width:100%;max-height:100%;border-radius:10px;box-shadow:0 8px 26px rgba(15,30,50,.18);object-fit:contain}
.gal{flex:1;min-height:0;display:grid;gap:16px;align-content:center}
.gal.g2{grid-template-columns:1fr 1fr}.gal.g3{grid-template-columns:1fr 1fr 1fr}
.gal figure{display:flex;flex-direction:column;height:100%;min-height:0}
.gal .gimg{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;background:#f1f3f7;border-radius:10px;overflow:hidden}
.gal img{max-width:100%;max-height:100%;object-fit:cover;width:100%;height:100%}
.gal figcaption{font-family:var(--mono);font-size:14px;color:var(--ink3);text-align:center;margin-top:7px}
table.t{width:100%;border-collapse:collapse;font-size:21px;margin-top:6px}
table.t th,table.t td{padding:11px 16px;border-bottom:1px solid var(--line);text-align:left}
table.t th{font-family:var(--body);font-weight:700;color:#fff}
table.t td.m{font-family:var(--mono)}
/* TÍMLAP / SZEKCIÓ / ZÁRÓ */
.slide.title-s,.slide.closing-s{justify-content:center;align-items:flex-start;padding:0 80px}
.title-s .ti-eyebrow{font-family:var(--mono);font-size:19px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;color:#7fa8d8;margin-bottom:18px}
.title-s .ti-h{font-weight:900;font-size:74px;line-height:1.02;letter-spacing:-.02em;color:#fff}
.title-s .ti-sub{font-size:26px;color:#c9d6e8;margin-top:24px;max-width:880px}
.title-s .ti-meta{font-family:var(--mono);font-size:18px;color:#9fb3cc;margin-top:28px}
.title-s{background:linear-gradient(135deg,#16314f 0%,#0e2138 60%,#142b1f 100%)}
.section-s{align-items:flex-start;justify-content:center;padding:0 90px;color:#fff}
.section-s .se-n{font-family:var(--mono);font-size:130px;font-weight:800;line-height:.9;opacity:.32}
.section-s .se-t{font-weight:900;font-size:62px;line-height:1.05;letter-spacing:-.015em;margin-top:6px}
.section-s .se-s{font-size:25px;margin-top:18px;max-width:880px;opacity:.92}
.closing-s{background:linear-gradient(135deg,#16314f,#0e2138);color:#fff}
.closing-s .cl-h{font-weight:900;font-size:60px;color:#fff}
.closing-s .cl-t{font-size:19px;line-height:1.55;color:#c9d6e8;margin-top:22px;max-width:920px}
.closing-s img.lg{max-width:520px;width:70%;margin-top:30px;background:#fff;padding:12px 16px;border-radius:10px}
/* HUD */
.hud{position:fixed;left:0;right:0;bottom:0;height:6px;background:rgba(255,255,255,.08);z-index:50}
.hud .fill{height:100%;background:#7fa8d8;width:0;transition:width .3s}
.counter{position:fixed;right:18px;bottom:16px;font-family:var(--mono);font-size:13px;color:#9fb3cc;z-index:50}
.seclabel{position:fixed;left:18px;bottom:14px;font-family:var(--mono);font-size:12.5px;letter-spacing:.04em;color:#9fb3cc;z-index:50;text-transform:uppercase}
.navbtn{position:fixed;top:50%;transform:translateY(-50%);z-index:60;width:46px;height:46px;border-radius:50%;border:none;background:rgba(255,255,255,.12);color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.navbtn:hover{background:rgba(255,255,255,.26)}
.navbtn.l{left:14px}.navbtn.r{right:14px}
.tools{position:fixed;top:14px;right:16px;z-index:60;display:flex;gap:8px}
.tools button{border:none;background:rgba(255,255,255,.12);color:#fff;font-family:var(--mono);font-size:12px;padding:7px 11px;border-radius:7px;cursor:pointer}
.tools button:hover{background:rgba(255,255,255,.26)}
/* MENÜ overlay */
.menu{position:fixed;inset:0;z-index:90;background:rgba(8,14,24,.96);display:none;flex-direction:column;padding:48px 56px;overflow:auto}
.menu.open{display:flex}
.menu h3{color:#fff;font-size:24px;margin-bottom:20px;font-weight:800}
.menu .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.menu .mitem{text-align:left;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#dbe6f4;border-radius:9px;padding:12px 14px;cursor:pointer;font-size:15px;font-family:var(--body)}
.menu .mitem:hover{background:rgba(127,168,216,.22)}
.menu .mitem .mn{font-family:var(--mono);font-size:12px;color:#7fa8d8;display:block;margin-bottom:3px}
.hint{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);font-family:var(--mono);font-size:12px;color:#8aa0bb;z-index:50;opacity:.85}
@media (max-width:700px){.hint{display:none}}
.nowrap{white-space:nowrap}
</style>
</head>
<body>
<div class="stage"><div class="deck" id="deck"></div></div>

<button class="navbtn l" id="prevBtn" aria-label="Előző">‹</button>
<button class="navbtn r" id="nextBtn" aria-label="Következő">›</button>
<div class="tools">
  <button id="menuBtn" title="Szekciók (M)">☰ Menü</button>
  <button id="fsBtn" title="Teljes képernyő (F)">⛶ Teljes</button>
</div>
<div class="seclabel" id="secLabel"></div>
<div class="counter" id="counter"></div>
<div class="hud"><div class="fill" id="hudFill"></div></div>
<div class="hint" id="hint">← → vagy szóköz: lapozás · F: teljes képernyő · M: menü</div>
<div class="menu" id="menu"><h3>Ugrás szekcióra</h3><div class="mgrid" id="menuGrid"></div></div>

<script>
/* ───────── szekciók (szín + név) ───────── */
const SEC={
  cel:{n:'A talajfelderítés célja',c:'#2f5d8a'},
  adat:{n:'Adatgyűjtés',c:'#1f8aa0'},
  furas:{n:'Talajfeltárás · Fúrások',c:'#b06a2c'},
  godor:{n:'Talajfeltárás · Kutatógödör',c:'#9c7a2c'},
  minta:{n:'Talajfeltárás · Talajminták',c:'#a8553a'},
  geofiz:{n:'Talajfeltárás · Geofizika',c:'#4a7a3a'},
  szonda:{n:'Talajfeltárás · Szondázások',c:'#3d6aa0'},
  jelentes:{n:'Talajvizsgálati jelentés',c:'#6a4f8c'},
  feltart:{n:'Feltártság mértéke',c:'#2e7d4f'},
  viz:{n:'Talajvíz felderítése',c:'#2f6aa8'}
};
const I='img/';
/* ───────── generált SVG-ábrák ───────── */
const FM='JetBrains Mono,monospace', FB='Segoe UI,sans-serif';
function svgWrap(inner,vb){return '<svg viewBox="'+vb+'" style="max-width:100%;max-height:540px;width:100%;height:auto" xmlns="http://www.w3.org/2000/svg">'+inner+'</svg>';}
function DG_flow(){
  const st=[['Adatgyűjtés','helyszíni szemle + adattár','#1f8aa0'],['Feltárási terv','típus · mélység · mennyiség','#b06a2c'],['Talajfeltárás','fúrás · gödör · szonda · geofizika','#3d6aa0'],['Talajvizsgálati jelentés','értékelés · paraméterek','#6a4f8c']];
  let g='<defs><marker id="ar" markerWidth="12" markerHeight="12" refX="8" refY="3" orient="auto"><path d="M0 0 L8 3 L0 6 z" fill="#6b7888"/></marker></defs>';
  let x=24, bw=256, gap=44, y=190, h=150;
  st.forEach((s,i)=>{
    g+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+h+'" rx="16" fill="'+s[2]+'" fill-opacity="0.12" stroke="'+s[2]+'" stroke-width="2.5"/>';
    g+='<text x="'+(x+bw/2)+'" y="'+(y+62)+'" text-anchor="middle" font-family="'+FB+'" font-weight="800" font-size="27" fill="'+s[2]+'">'+s[0]+'</text>';
    g+='<text x="'+(x+bw/2)+'" y="'+(y+98)+'" text-anchor="middle" font-family="'+FM+'" font-size="15" fill="#3a4858">'+s[1]+'</text>';
    if(i<3) g+='<path d="M'+(x+bw+8)+' '+(y+h/2)+' L'+(x+bw+gap-10)+' '+(y+h/2)+'" stroke="#6b7888" stroke-width="3" marker-end="url(#ar)"/>';
    x+=bw+gap;
  });
  return svgWrap(g,'0 0 '+x+' 540');
}
function DG_cpt(){
  const lay=[[0,4,'Homok','#e6c25a'],[4,9,'Agyag','#a9895a'],[9,11,'Törmelékes','#bf7440'],[11,18,'Agyag','#a9895a']];
  const dz=0.25, pts=[];
  for(let z=0;z<=18.0001;z+=dz){ let qc,Rf;
    if(z<4){qc=8+3.5*Math.sin(z*1.3);Rf=0.5+0.2*Math.sin(z*2);}
    else if(z<9){qc=1.0+0.4*Math.sin(z);Rf=3.6+1.1*Math.sin(z*1.5);}
    else if(z<11){qc=9.5+3*Math.sin(z*3);Rf=0.6;}
    else{qc=1.3+0.5*Math.sin(z*0.8);Rf=4+Math.sin(z);}
    pts.push({z,qc:Math.max(0.3,qc),Rf:Math.max(0.1,Rf),u:Math.max(0,9.81*(z-2))}); }
  const top=46,bottom=506,Zmax=18, yOf=z=>top+z/Zmax*(bottom-top);
  let g='';
  // rétegoszlop
  const lx=40,lw=84;
  lay.forEach(L=>{ g+='<rect x="'+lx+'" y="'+yOf(L[0]).toFixed(1)+'" width="'+lw+'" height="'+(yOf(L[1])-yOf(L[0])).toFixed(1)+'" fill="'+L[3]+'" fill-opacity="0.5" stroke="#8a7350"/>';
    g+='<text x="'+(lx+lw/2)+'" y="'+((yOf(L[0])+yOf(L[1]))/2+4).toFixed(1)+'" text-anchor="middle" font-family="'+FM+'" font-size="13" fill="#3a2e1a" transform="rotate(-90 '+(lx+lw/2)+' '+((yOf(L[0])+yOf(L[1]))/2).toFixed(1)+')">'+L[2]+'</text>'; });
  g+='<text x="'+(lx+lw/2)+'" y="30" text-anchor="middle" font-family="'+FM+'" font-size="13" fill="#6b7888">réteg</text>';
  // mélységskála
  for(let z=0;z<=18;z+=3){ g+='<text x="'+(lx-8)+'" y="'+(yOf(z)+4).toFixed(1)+'" text-anchor="end" font-family="'+FM+'" font-size="12" fill="#9aa3ad">'+z+'</text>'; }
  g+='<text x="14" y="'+((top+bottom)/2).toFixed(1)+'" font-family="'+FM+'" font-size="12" fill="#6b7888" transform="rotate(-90 14 '+((top+bottom)/2).toFixed(1)+')">mélység z [m]</text>';
  function panel(px,pw,title,key,vmax,unit,col){
    g+='<rect x="'+px+'" y="'+top+'" width="'+pw+'" height="'+(bottom-top)+'" fill="#fff" stroke="#d6dbe4"/>';
    [0.25,0.5,0.75,1].forEach(q=>{const gx=px+q*pw; g+='<line x1="'+gx+'" y1="'+top+'" x2="'+gx+'" y2="'+bottom+'" stroke="#eef0f4"/>';});
    let d='M'; pts.forEach((p,i)=>{ d+=(i?' L':'')+(px+Math.min(1,p[key]/vmax)*pw).toFixed(1)+' '+yOf(p.z).toFixed(1); });
    g+='<path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2"/>';
    g+='<text x="'+(px+pw/2)+'" y="30" text-anchor="middle" font-family="'+FB+'" font-weight="700" font-size="16" fill="'+col+'">'+title+'</text>';
    g+='<text x="'+px+'" y="'+(bottom+20)+'" font-family="'+FM+'" font-size="11" fill="#9aa3ad">0</text>';
    g+='<text x="'+(px+pw)+'" y="'+(bottom+20)+'" text-anchor="end" font-family="'+FM+'" font-size="11" fill="#9aa3ad">'+vmax+' '+unit+'</text>';
  }
  panel(180,250,'qc — csúcsellenállás','qc',16,'MPa','#c2521f');
  panel(470,250,'Rf — súrlódási arány','Rf',6,'%','#2e7d4f');
  panel(760,250,'u — pórusvíznyomás','u',180,'kPa','#2f6aa8');
  return svgWrap(g,'0 0 1040 540');
}
function DG_gw(){
  let g='', W=1100, surf=120;
  // rétegek
  g+='<rect x="0" y="'+surf+'" width="'+W+'" height="120" fill="#e6c25a" fill-opacity="0.55"/>';            // homok (felső, szabad tv)
  g+='<rect x="0" y="240" width="'+W+'" height="70" fill="#a9895a" fill-opacity="0.6"/>';                    // agyag (záró)
  g+='<rect x="0" y="310" width="'+W+'" height="120" fill="#cdb86a" fill-opacity="0.6"/>';                   // homok (rétegvíz)
  g+='<rect x="0" y="430" width="'+W+'" height="70" fill="#8a6f48" fill-opacity="0.7"/>';                    // alsó záró
  g+='<line x1="0" y1="'+surf+'" x2="'+W+'" y2="'+surf+'" stroke="#8c7a55" stroke-width="2"/>';
  // szabad felszínű talajvíz
  g+='<line x1="0" y1="175" x2="'+W+'" y2="175" stroke="#2f6aa8" stroke-width="2.5" stroke-dasharray="8 5"/>';
  g+='<path d="M40 175 l10 0 l-5 8 z" fill="#2f6aa8"/>';
  g+='<text x="60" y="170" font-family="'+FM+'" font-size="15" fill="#1f4f86">① szabad felszínű talajvíz</text>';
  // lebegő (perched) lencse
  g+='<path d="M300 150 q90 -26 180 0 q-90 22 -180 0 Z" fill="#7fb0d8" fill-opacity="0.7" stroke="#2f6aa8"/>';
  g+='<text x="300" y="143" font-family="'+FM+'" font-size="14" fill="#1f4f86">⑤ lebegő talajvíz</text>';
  // nyomás alatti (rétegvíz) + piezometrikus szint (artézi)
  g+='<text x="60" y="378" font-family="'+FM+'" font-size="15" fill="#1f4f86">③ nyomás alatti (rétegvíz)</text>';
  g+='<line x1="0" y1="150" x2="'+W+'" y2="150" stroke="#a32626" stroke-width="2" stroke-dasharray="3 4"/>';
  g+='<text x="'+(W-12)+'" y="144" text-anchor="end" font-family="'+FM+'" font-size="13" fill="#a32626">nyomásszint (piezometrikus) — artézi</text>';
  // rétegcímkék
  g+='<text x="'+(W-12)+'" y="200" text-anchor="end" font-family="'+FM+'" font-size="13" fill="#5a4a28">homok (vízadó)</text>';
  g+='<text x="'+(W-12)+'" y="282" text-anchor="end" font-family="'+FM+'" font-size="13" fill="#3a2e1a">agyag (vízzáró)</text>';
  g+='<text x="'+(W-12)+'" y="378" text-anchor="end" font-family="'+FM+'" font-size="13" fill="#5a4a28">homok (vízadó)</text>';
  return svgWrap(g,'0 0 '+W+' 520');
}
function DG_depth(){
  let g='', cx=560, surf=70;
  // talaj
  g+='<rect x="0" y="'+surf+'" width="1120" height="450" fill="#e3d9c6"/>';
  g+='<line x1="0" y1="'+surf+'" x2="1120" y2="'+surf+'" stroke="#8c7a55" stroke-width="2"/>';
  // épület + alaptest
  g+='<rect x="'+(cx-150)+'" y="'+(surf-90)+'" width="300" height="80" fill="#9aa3ad" stroke="#5f6973"/>';
  g+='<rect x="'+(cx-90)+'" y="'+(surf-6)+'" width="180" height="26" fill="#7c8590" stroke="#5f6973"/>';
  g+='<text x="'+cx+'" y="'+(surf-44)+'" text-anchor="middle" font-family="'+FB+'" font-weight="700" font-size="20" fill="#fff">épület</text>';
  // feszültséghagyma (koncentrikus ellipszisek)
  [[150,90,'#c2521f',0.30],[230,180,'#c2521f',0.18],[320,280,'#c2521f',0.10]].forEach(e=>{
    g+='<ellipse cx="'+cx+'" cy="'+(surf+e[1])+'" rx="'+e[0]+'" ry="'+e[1]+'" fill="'+e[2]+'" fill-opacity="'+e[3]+'"/>'; });
  g+='<text x="'+(cx+200)+'" y="'+(surf+150)+'" font-family="'+FM+'" font-size="14" fill="#a8431a">feszültséghagyma</text>';
  // za mélység jel
  const za=surf+300;
  g+='<line x1="'+(cx+350)+'" y1="'+surf+'" x2="'+(cx+350)+'" y2="'+za+'" stroke="#16202e" stroke-width="1.5" stroke-dasharray="4 4"/>';
  g+='<line x1="'+(cx+340)+'" y1="'+za+'" x2="'+(cx+360)+'" y2="'+za+'" stroke="#16202e" stroke-width="2"/>';
  g+='<text x="'+(cx+360)+'" y="'+((surf+za)/2).toFixed(0)+'" font-family="'+FM+'" font-size="16" fill="#16202e">z<tspan baseline-shift="sub" font-size="11">a</tspan> (feltárási mélység)</text>';
  // szabály
  g+='<rect x="40" y="120" width="360" height="150" rx="12" fill="#fff" fill-opacity="0.92" stroke="#2e7d4f"/>';
  g+='<text x="60" y="152" font-family="'+FB+'" font-weight="700" font-size="18" fill="#2e7d4f">Javasolt feltárási mélység</text>';
  g+='<text x="60" y="184" font-family="'+FM+'" font-size="16" fill="#3a4858">Különálló alap: z_a ≥ 4–6 m</text>';
  g+='<text x="60" y="210" font-family="'+FM+'" font-size="16" fill="#3a4858">és z_a ≥ 3,0 · b_min</text>';
  g+='<text x="60" y="240" font-family="'+FM+'" font-size="16" fill="#3a4858">Lemezalap: z_a ≥ 1,5 · b_B</text>';
  return svgWrap(g,'0 0 1120 540');
}
function DG_grid(){
  let g='';
  g+='<rect x="60" y="60" width="600" height="400" rx="6" fill="#dce8f5" stroke="#3d6aa0" stroke-width="2"/>';
  g+='<text x="360" y="40" text-anchor="middle" font-family="'+FB+'" font-weight="700" font-size="20" fill="#3d6aa0">épület alaprajza (feltárási háló)</text>';
  const xs=[120,360,600], ys=[120,280,400];
  xs.forEach(px=>ys.forEach(py=>{ g+='<g><line x1="'+(px-11)+'" y1="'+(py-11)+'" x2="'+(px+11)+'" y2="'+(py+11)+'" stroke="#a32626" stroke-width="3"/><line x1="'+(px-11)+'" y1="'+(py+11)+'" x2="'+(px+11)+'" y2="'+(py-11)+'" stroke="#a32626" stroke-width="3"/></g>'; }));
  // távméret
  g+='<line x1="120" y1="490" x2="360" y2="490" stroke="#16202e" stroke-width="1.5" marker-start="url(#a2)" marker-end="url(#a2)"/>';
  g+='<defs><marker id="a2" markerWidth="10" markerHeight="10" refX="3" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#16202e"/></marker></defs>';
  g+='<text x="240" y="484" text-anchor="middle" font-family="'+FM+'" font-size="15" fill="#16202e">25–40 m</text>';
  // jelmagyarázat

/* ───────── renderelés ───────── */
const deck=$id('deck');
function $id(i){return document.getElementById(i);}
function esc(s){return s;}
function secOf(s){return s.sec?SEC[s.sec]:null;}
function head(s){const c=secOf(s); return '<div class="head"><div class="kicker" style="color:'+c.c+'">'+c.n+'</div><div class="title">'+s.t+'</div><div class="rule" style="background:'+c.c+'"></div></div>';}
function bulletList(items,col){return '<ul class="big">'+items.map(x=>'<li style="">'+x.replace('<li','<li')+'</li>').map(x=>x).join('')+'</ul>';}
function renderSlide(s){
  const c=secOf(s);
  if(s.type==='title') return '<div class="slide title-s"><div><div class="ti-eyebrow">Alapozás · Geotechnika</div><div class="ti-h">'+s.t+'</div><div class="ti-sub">'+s.sub+'</div><div class="ti-meta">'+s.meta+'</div></div></div>';
  if(s.type==='section') return '<div class="slide section-s" style="background:linear-gradient(135deg,'+c.c+',#0e2138)"><div><div class="se-n">'+s.n+'</div><div class="se-t">'+(s.t2||c.n)+'</div>'+(s.sub?'<div class="se-s">'+s.sub+'</div>':'')+'</div></div>';
  if(s.type==='closing') return '<div class="slide closing-s"><div><div class="cl-h">'+s.t+'</div><div class="cl-t">'+s.text+'</div><img class="lg" src="'+I+'../logo.jpg" alt="Támogatói logó" onerror="this.style.display=\'none\'"></div></div>';
  let body='';
  const ul=(items)=>{let h='<ul class="big">';items.forEach(x=>{h+='<li><span style="position:absolute;left:4px;top:13px;width:12px;height:12px;border-radius:3px;background:'+c.c+'"></span>'+x+'</li>';});return h+'</ul>';};
  if(s.type==='lead') body='<div class="bodyA"><div class="lead">'+s.lead+'</div></div>';
  else if(s.type==='bullets') body='<div class="bodyA">'+ul(s.items)+(s.note?'<div class="lead" style="font-size:19px;color:var(--ink3);margin-top:auto"><b style="color:'+c.c+'">▸ </b>'+s.note+'</div>':'')+'</div>';
  else if(s.type==='image') body='<div class="bodyA"><div class="imgwrap"><img src="'+I+s.img+'" loading="lazy" alt=""></div>'+(s.cap?'<div class="cap">'+s.cap+'</div>':'')+'</div>';
  else if(s.type==='two') body='<div class="bodyA"><div class="two"><div>'+ul(s.items)+'</div><div class="col-img"><div style="display:flex;flex-direction:column;max-height:100%"><img src="'+I+s.img+'" loading="lazy" alt="">'+(s.cap?'<div class="cap">'+s.cap+'</div>':'')+'</div></div></div></div>';
  else if(s.type==='gallery'){ let figs=s.imgs.map(im=>'<figure><div class="gimg"><img src="'+I+im.src+'" loading="lazy" alt=""></div><figcaption>'+im.cap+'</figcaption></figure>').join('');
    body='<div class="bodyA"><div class="gal g'+s.g+'">'+figs+'</div>'+(s.note?'<div class="cap" style="font-size:16px;color:var(--ink2);margin-top:12px">'+s.note+'</div>':'')+'</div>'; }
  else if(s.type==='diagram') body='<div class="bodyA"><div class="imgwrap">'+s.svg+'</div>'+(s.note?'<div class="cap" style="font-size:16px;color:var(--ink2)">'+s.note+'</div>':'')+'</div>';
  else if(s.type==='diagramText') body='<div class="bodyA"><div class="two"><div>'+ul(s.items)+'</div><div class="col-img">'+s.svg+'</div></div></div>';
  else if(s.type==='table'){ let h='<table class="t"><thead><tr>'+s.head.map(x=>'<th style="background:'+c.c+'">'+x+'</th>').join('')+'</tr></thead><tbody>'+s.rows.map(r=>'<tr>'+r.map((x,j)=>'<td class="'+(j>0?'m':'')+'">'+x+'</td>').join('')+'</tr>').join('')+'</tbody></table>'; body='<div class="bodyA">'+h+(s.note?'<div class="cap" style="font-size:15px;color:var(--ink2);margin-top:14px">'+s.note+'</div>':'')+'</div>'; }
  else if(s.type==='matrix') body='<div class="bodyA">'+s.html+(s.note?'<div class="cap" style="font-size:16px;color:var(--ink2);margin-top:14px">'+s.note+'</div>':'')+'</div>';
  return '<div class="slide">'+head(s)+body+'</div>';
}
deck.innerHTML=SL.map(renderSlide).join('');
const slides=[...deck.querySelectorAll('.slide')];

/* ───────── léptetés ───────── */
let cur=0;
function show(i){
  i=Math.max(0,Math.min(slides.length-1,i));
  slides.forEach((el,k)=>{ el.classList.toggle('on',k===i); el.classList.toggle('prev',k<i); });
  cur=i;
  $id('counter').textContent=(i+1)+' / '+slides.length;
  $id('hudFill').style.width=((i)/(slides.length-1)*100)+'%';
  const s=SL[i], c=secOf(s);
  $id('secLabel').textContent = s.type==='title'?'Talajfelderítés' : s.type==='closing'?'' : (c?c.n:'');
  if(window.__typo){ const el=slides[i]; window.__typo(el); }
}
function next(){ if(cur<slides.length-1) show(cur+1); }
function prev(){ if(cur>0) show(cur-1); }
$id('nextBtn').onclick=next; $id('prevBtn').onclick=prev;
document.addEventListener('keydown',e=>{
  if($id('menu').classList.contains('open')){ if(e.key==='Escape'||e.key.toLowerCase()==='m'){toggleMenu(false);} return; }
  if(['ArrowRight',' ','PageDown','Enter'].includes(e.key)){e.preventDefault();next();}
  else if(['ArrowLeft','PageUp','Backspace'].includes(e.key)){e.preventDefault();prev();}
  else if(e.key==='Home'){show(0);} else if(e.key==='End'){show(slides.length-1);}
  else if(e.key.toLowerCase()==='f'){toggleFs();}
  else if(e.key.toLowerCase()==='m'){toggleMenu();}
});
/* érintés / swipe */
let tx=0; deck.addEventListener('touchstart',e=>tx=e.touches[0].clientX,{passive:true});
deck.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx; if(Math.abs(dx)>50){dx<0?next():prev();}},{passive:true});
/* a dián kattintás: jobb fél = előre, bal fél = vissza */
deck.addEventListener('click',e=>{ const r=deck.getBoundingClientRect(); (e.clientX-r.left)/r.width>0.5?next():prev(); });

/* teljes képernyő */
function toggleFs(){ if(!document.fullscreenElement){document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();} else {document.exitFullscreen&&document.exitFullscreen();} }
$id('fsBtn').onclick=toggleFs;

/* menü (szekciók) */
const menuItems=SL.map((s,i)=>({i,s})).filter(o=>o.s.type==='section'||o.s.type==='title'||o.s.type==='closing');
$id('menuGrid').innerHTML=menuItems.map(o=>{
  const s=o.s, c=secOf(s); const label = s.type==='title'?'Címlap':s.type==='closing'?'Zárás':(c?c.n:'');
  const num = s.type==='section'?s.n:'';
  return '<button class="mitem" data-i="'+o.i+'"><span class="mn">'+(num?num+' ·':'')+' '+(s.type==='section'?'szekció':s.type)+'</span>'+label+'</button>';
}).join('');
$id('menuGrid').addEventListener('click',e=>{const b=e.target.closest('.mitem');if(!b)return; show(+b.dataset.i); toggleMenu(false);});
function toggleMenu(force){ const m=$id('menu'); const open=force===undefined?!m.classList.contains('open'):force; m.classList.toggle('open',open); }
$id('menuBtn').onclick=()=>toggleMenu();
$id('menu').addEventListener('click',e=>{ if(e.target===$id('menu'))toggleMenu(false); });

/* a stage skálázása 1280×720-ra */
function fit(){ const sc=Math.min(window.innerWidth/1280, window.innerHeight/720); deck.style.transform='scale('+sc+')'; }
window.addEventListener('resize',fit); fit();
setTimeout(()=>{ const h=$id('hint'); if(h) h.style.transition='opacity 1s'; },4000);
setTimeout(()=>{ const h=$id('hint'); if(h) h.style.opacity='0'; },6000);
show(0);
</script>
<script>
/* Magyar tipográfia — automatikus sortörés-szabályok */
(function(){
  "use strict";
  var NBSP=' ', WJ='⁠';
  function fix(s){
    s=s.replace(/([.!?…][)"'»”’]?\s+\S+) (?=\S)/g,'$1'+NBSP);
    s=s.replace(/(^|[\s(„"'«»–—])(a|az|s|e|é|és|is) (?=\S)/gi,'$1$2'+NBSP);
    s=s.replace(/ (?=[=+−·×<>≈≥≤≠\/])/g,NBSP);
    s=s.replace(/([=+−·×<>≈≥≤≠\/]) /g,'$1'+NBSP);
    s=s.replace(/(\d) (?=(?:kPa|MPa|GPa|kN\/m³|kN|cm|mm|km|kg|°C|°|%|m|t|mg\/l|év)(?:[\s.,;:!?)\]–—]|$))/g,'$1'+NBSP);
    s=s.replace(/([0-9A-Za-zÀ-ſ])([\-–—])([0-9A-Za-zÀ-ſ])/g,'$1'+WJ+'$2'+WJ+'$3');
    return s;
  }
  var SKIP={SCRIPT:1,STYLE:1,CODE:1,PRE:1,KBD:1,SAMP:1,INPUT:1,TEXTAREA:1,SELECT:1,OPTION:1,NOSCRIPT:1};
  function walk(el){ if(!el)return;
    for(var n=el.firstChild;n;n=n.nextSibling){
      if(n.nodeType===3){ var t=n.nodeValue; if(t&&/\S/.test(t)){ var nt=fix(t); if(nt!==t)n.nodeValue=nt; } }
      else if(n.nodeType===1){ var tag=n.tagName?n.tagName.toUpperCase():''; if(SKIP[tag])continue;
        if(n.namespaceURI==='http://www.w3.org/2000/svg')continue;
        if(n.classList&&n.classList.contains('nowrap'))continue; walk(n); }
    }
  }
  window.__typo=function(el){ walk(el||document.body); };
  function run(){ walk(document.body); }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',run); else run();
})();
</script>
